<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduCore SMS — School Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <!-- Login Page -->
    <div id="loginPage" class="page active">
      <div class="login-bg">
        <div class="bg-grid"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="floaters" id="floaters"></div>
      </div>
      <div class="login-card">
        <div class="login-logo">
          <span class="logo-icon">🎓</span>
          <div>
            <h1 class="logo-title">EduCore</h1>
            <p class="logo-sub">School Management System</p>
          </div>
        </div>
        <div class="login-form-area">
          <h2>Welcome Back</h2>
          <p class="login-hint">Sign in with your credentials</p>
          <div class="field">
            <label>Email Address</label>
            <div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="loginEmail" placeholder="your@email.com"></div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="loginPass" placeholder="••••••••"></div>
          </div>
          <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">
            <span id="loginBtnText">Sign In</span>
          </button>
          <p class="login-demo">Demo: <strong>admin@sms.com</strong> / <strong>admin123</strong></p>
        </div>
      </div>
    </div>

    <!-- Main App Shell -->
    <div id="appShell" class="page">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <span>🎓</span>
            <div class="sidebar-brand">
              <span class="brand-name">EduCore</span>
              <span class="brand-sub">SMS</span>
            </div>
          </div>
          <button class="sidebar-close" id="sidebarClose" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sidebar-user" id="sidebarUser">
          <div class="user-avatar" id="userAvatarSidebar">A</div>
          <div class="user-info">
            <span class="user-name" id="userNameSidebar">Loading...</span>
            <span class="user-role" id="userRoleSidebar">...</span>
          </div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
          <!-- Dynamically filled based on role -->
        </nav>
        <div class="sidebar-footer">
          <button class="btn-logout" onclick="doLogout()">🚪 Sign Out</button>
        </div>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

      <!-- Main Content -->
      <div class="main-area" id="mainArea">
        <!-- Top bar -->
        <header class="topbar">
          <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-title" id="topbarTitle">Dashboard</div>
          <div class="topbar-right">
            <div class="device-badge" id="deviceBadge">💻</div>
            <div class="topbar-user">
              <div class="user-avatar sm" id="topbarAvatar">A</div>
            </div>
          </div>
        </header>

        <!-- Page Content -->
        <main class="content" id="content">
          <!-- Dynamically rendered -->
        </main>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" onclick="closeModalOverlay(event)">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/device.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/schools.js"></script>
  <script src="js/pages/users.js"></script>
  <script src="js/pages/students.js"></script>
  <script src="js/pages/marks.js"></script>
  <script src="js/pages/results.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
